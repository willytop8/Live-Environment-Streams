name: Validate Streams

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run validation (HLS streams only, limit to 500 per run)
        run: python scripts/validate.py --type hls --limit 500

      - name: Regenerate country files
        run: python scripts/regenerate_country_files.py

      - name: Update stats
        run: python scripts/stats.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streams.geojson data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly stream validation $(date -u +%Y-%m-%d)"
            git push
          fi
